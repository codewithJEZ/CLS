<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Login — Campus Locator System</title>

  <!-- Bootstrap 5 -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <!-- Bootstrap Icons -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet" />
  <!-- Google Fonts -->
  <link
    href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=DM+Sans:wght@400;500;600&display=swap"
    rel="stylesheet" />

  <link rel="stylesheet" href="style.css" />
</head>

<body>

  <!-- Decorative background blobs -->
  <div class="bg-blob blob-1"></div>
  <div class="bg-blob blob-2"></div>

  <div class="page-wrapper d-flex flex-column align-items-center justify-content-center min-vh-100 px-3">

    <!-- LOGIN CARD -->
    <div class="login-card" id="loginCard">

      <!-- LOGO -->
      <div class="logo-wrap">
        <img src="../assets/logo.png" alt="Pampanga State University Logo" class="logo-img"
          onerror="this.style.display='none'; document.getElementById('logoFallback').style.display='flex';" />
        <!-- Fallback when logo.png is absent -->
        <div id="logoFallback" class="logo-fallback" style="display:none;">
          <i class="bi bi-mortarboard-fill"></i>
        </div>
      </div>

      <!-- TITLES -->
      <h1 class="card-title">CLS Admin</h1>
      <p class="card-subtitle">Campus Locator System</p>

      <!-- ERROR BANNER -->
      <div class="error-box" id="errorBox" role="alert" aria-live="polite">
        <i class="bi bi-exclamation-circle-fill me-2"></i>
        <span id="errorMsg"></span>
      </div>

      <!-- FORM -->
      <div class="form-fields">

        <!-- Username -->
        <div class="field-group" id="fieldUsername">
          <input type="text" id="username" class="field-input" placeholder=" " autocomplete="username"
            aria-label="Username" />
          <label class="field-label" for="username">Username</label>
          <i class="bi bi-person field-icon"></i>
        </div>

        <!-- Password -->
        <div class="field-group" id="fieldPassword">
          <input type="password" id="password" class="field-input" placeholder=" " autocomplete="current-password"
            aria-label="Password" />
          <label class="field-label" for="password">Password</label>
          <i class="bi bi-lock field-icon" id="pwIcon"></i>
          <button type="button" class="pw-toggle" id="pwToggle" aria-label="Toggle password visibility">
            <i class="bi bi-eye" id="eyeIcon"></i>
          </button>
        </div>

        <!-- Login Button -->
        <button class="btn-login" id="loginBtn" onclick="handleLogin()">
          <span class="btn-text">Login</span>
          <i class="bi bi-arrow-right btn-arrow"></i>
        </button>

      </div>
    </div>

    <!-- Footer -->
    <footer class="page-footer">
      <span>Pampanga State University</span>
      <span class="sep">|</span>
      <span>Main Campus</span>
    </footer>

  </div>

  <script src="script.js"></script>
</body>

</html>
